<script>
    window.addEventListener("musickitloaded", () => {
        configure();
        console.info("MusicKit Loaded");
    });
    const configure = () => {
        MusicKit.configure({
            developerToken: "eyJhbGciOiJFUzI1NiIsImtpZCI6IjlDNUM1MlpXTlQifQ.eyJpc3MiOiJDUFJaOTQzODlIIiwiaWF0IjoxNzczNjI0MDE0LCJleHAiOjE3NzM2MjQwMTR9.Ublq7Ug--ZUvRa6111ZzsmgNtJth2VuXo-sDdqq7LeRHRYUG5clsKEuEUeJH3F9R4sjWJ9BYmsFMiwOzbT6ZzQ",
            app: {
                name: "Vibrance",
                build: "1.0"
            }
        });
    }

    const onButtonClick = () => {
        console.log("Auth Flow Started")
        let music = MusicKit.getInstance();
        music.authorize().then((token) => {
            console.log("Authorized");
            console.log("Token is: " + token);
            window.location.href = "https://kgeok.github.io/Vibrance/AppleMusic/AuthDone/auth?token=" + encodeURIComponent(token);
        }).catch(e => {
            console.log('Error:' + e);
        });
    }
</script>

<body>
    <h1>Sign In Required</h1>
    <h2>You Will Need To Sign In to Apple Music To Continue</h2>
    <button id="apple-music-authorize" onclick="onButtonClick()">Sign In With Apple</button>
